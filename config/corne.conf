# --- CONECTIVIDAD Y SISTEMA ---
# Nombre del dispositivo visto por Bluetooth y Windows
CONFIG_ZMK_KEYBOARD_NAME="Corne MX"

# Potencia de radio BLE al máximo (+8). Ayuda con interferencias y latencia entre mitades.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Reporte de batería cada 60 segundos.
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# Resuelve errores de reporte de batería en Windows (obligatorio para evitar errores de driver).
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Habilita el soporte USB y Bluetooth.
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# --- PANTALLA OLED ---
# Activa el soporte para pantallas. [BATERÍA: RECOMENDADO APAGAR SI BUSCAS MÁXIMA AUTONOMÍA]
CONFIG_ZMK_DISPLAY=y

# Usa una cola de trabajo dedicada para la pantalla (evita que el teclado se trabe al actualizar el OLED).
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Usa la pantalla de estado estándar de ZMK.
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# --- ENERGÍA Y DEBOUNCE ---
# Tiempo para entrar en estado IDLE (10 min). Apaga luces y pantalla pero mantiene el Bluetooth.
CONFIG_ZMK_IDLE_TIMEOUT=600000

# Activa el modo Deep Sleep. [BATERÍA: OBLIGATORIO PARA QUE EL TECLADO DURE SEMANAS]
CONFIG_ZMK_SLEEP=y

# Tiempo para entrar en Deep Sleep (15 min). Apaga el Bluetooth por completo.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Filtro de pulsaciones (Debounce) en 5ms para evitar doble tipeo accidental.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# --- LUCES RGB (UNDERGLOW) ---
# Activa los LEDs bajo el teclado. [BATERÍA: RECOMENDADO APAGAR, ES LO QUE MÁS CONSUME]
CONFIG_ZMK_RGB_UNDERGLOW=y

# Apaga los LEDs automáticamente cuando el teclado no se usa (IDLE).
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Efecto inicial de luces al encender (3 = Respiración/Breath).
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3

# Brillo máximo limitado al 60% para no quemar la batería/LEDs.
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=60

# --- ZMK STUDIO (CONTROL SERIAL) ---
# Activa ZMK Studio. [ESTABILIDAD: SI EL PUERTO COM SIGUE FALLANDO, CAMBIAR A 'n']
CONFIG_ZMK_STUDIO=y

# Desactiva el bloqueo de seguridad para permitir cambios rápidos sin clave.
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# Drivers necesarios para que el puerto serie sea visible en Windows/Chrome.
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_ZMK_USB_BOOT=y

# Identificación del producto para el driver de Windows.
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Corne ZMK"