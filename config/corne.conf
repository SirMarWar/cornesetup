# --- CONFIGURACIÓN DE IDENTIDAD Y CONECTIVIDAD ---
# Nombre del teclado que aparecerá en el Bluetooth de Windows/PC
CONFIG_ZMK_KEYBOARD_NAME="Corne MX"
# Potencia de transmisión Bluetooth al máximo (+8). Ayuda a evitar lag entre las mitades
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Habilita el soporte para conexión vía cable USB
CONFIG_ZMK_USB=y
# Habilita el soporte para conexión inalámbrica Bluetooth
CONFIG_ZMK_BLE=y

# --- PANTALLA OLED ---
# Activa el soporte de pantalla. [BATERÍA: RECOMENDADO APAGAR PARA GANAR AUTONOMÍA]
CONFIG_ZMK_DISPLAY=y
# Usa una cola de trabajo dedicada para la pantalla (evita lentitud al escribir)
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
# Utiliza el diseño de pantalla por defecto de ZMK (Capa, Batería, Conexión)
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# --- GESTIÓN DE ENERGÍA Y RENDIMIENTO ---
# Reporta el nivel de batería cada 60 segundos
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60
# Corrige errores de reporte de batería específicos de Windows
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
# Tiempo de inactividad para apagar luces y pantalla (10 minutos)
CONFIG_ZMK_IDLE_TIMEOUT=600000
# Activa el modo de sueño profundo (Deep Sleep). [BATERÍA: OBLIGATORIO]
CONFIG_ZMK_SLEEP=y
# Tiempo de inactividad para entrar en sueño profundo y apagar Bluetooth (15 minutos)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
# Tiempos de eliminación de rebote (Debounce) para evitar doble tipeo
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# --- ZMK STUDIO Y COMUNICACIÓN SERIAL ---
# Activa el soporte para cambios en tiempo real con ZMK Studio
CONFIG_ZMK_STUDIO=y
# Desactiva el bloqueo de seguridad para editar el keymap libremente
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n
# Drivers de bajo nivel necesarios para la comunicación Serial/USB en Windows
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_ZMK_USB_BOOT=y
# Identificación del stack USB para que Windows reconozca el dispositivo correctamente
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="Corne ZMK"

# --- ILUMINACIÓN RGB (UNDERGLOW) ---
# Activa los LEDs RGB. [BATERÍA: RECOMENDADO APAGAR, ES LO QUE MÁS CONSUME]
CONFIG_ZMK_RGB_UNDERGLOW=y
# Apaga automáticamente los LEDs cuando el teclado entra en reposo
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
# Efecto de luces inicial al encender (3 = Respiración)
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=3
# Limita el brillo máximo al 60% para proteger los LEDs y la batería
CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=60
# No apaga la energía externa de los LEDs (mantiene la configuración de color)
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# --- COMPATIBILIDAD EXTRA ---
# Apaga el backlight tradicional si estuviera presente (evita conflictos con RGB)
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y